# Apache VirtualHost example for NosfirSolis (production)
# Path suggestion: /etc/apache2/sites-available/nosfirsolis.conf

<VirtualHost *:80>
    ServerName nosfirsolis.example.com
    ServerAdmin admin@example.com

    DocumentRoot /var/www/nosfirsolis

    <Directory /var/www/nosfirsolis>
        AllowOverride All
        Require all granted
        Options FollowSymLinks
    </Directory>

    # Runtime security environment (do not hardcode in app files)
    SetEnv TOKEN_CIPHER_KEY "replace_with_strong_key"
    SetEnv TOKEN_CIPHER_KEY_PREVIOUS ""
    SetEnv TRUSTED_PROXIES "127.0.0.1,::1"
    SetEnv ALLOWED_HOSTS "nosfirsolis.example.com"
    SetEnv AUTOMATION_ALLOW_PRIVATE_WEBHOOK_ENDPOINTS "0"

    ErrorLog ${APACHE_LOG_DIR}/nosfirsolis-error.log
    CustomLog ${APACHE_LOG_DIR}/nosfirsolis-access.log combined
</VirtualHost>

# For HTTPS, clone this block to <VirtualHost *:443> and configure SSL certs.
