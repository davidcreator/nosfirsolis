# Nginx + PHP-FPM example for NosfirSolis (production)
# Path suggestion: /etc/nginx/sites-available/nosfirsolis

server {
    listen 80;
    server_name nosfirsolis.example.com;

    root /var/www/nosfirsolis;
    index index.php index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        # Runtime security environment (prefer host-level env in production)
        fastcgi_param TOKEN_CIPHER_KEY "replace_with_strong_key";
        fastcgi_param TOKEN_CIPHER_KEY_PREVIOUS "";
        fastcgi_param TRUSTED_PROXIES "127.0.0.1,::1";
        fastcgi_param ALLOWED_HOSTS "nosfirsolis.example.com";
        fastcgi_param AUTOMATION_ALLOW_PRIVATE_WEBHOOK_ENDPOINTS "0";
    }

    location ~ /\.ht {
        deny all;
    }
}
